{% include "header.html" %}
{% include "nav.html" %}
<main>
  {% include "jumbotron.html" %}
  <div class="container">
    <div class="row">
      <div class="col-12">
        <div class="row g-3">
          {% for item in collections.pages | sort(false, false, 'data.title') %}
            {% if item.data.icon %}
              <div class="col-12 col-sm-12 col-md-6 col-lg-4 col-xl-4 d-flex align-items-stretch">
                <div class="card">
                  <div class="card-body">
                    <i class="{{ item.data.icon }} fa-2x mb-3"></i>
                    <h2 class="h5 mb-3">
                      <a href="{{ item.url }}" class="stretched-link">{{ item.data.title }}</a>
                    </h2>
                  </div>
                </div>
              </div>
            {% endif %}
          {% endfor %}
        </div>
      </div>
    </div>
  </div>
</main>
{% include "footer.html" %}
