<div>
  {% if layout == "layouts/post.html" %}
    <div class="pt-5 pb-4 mb-4 border-bottom">
      <div class="container">
        <div class="row">
          <div class="col-12 col-md-2"></div>
          <div class="col-12 col-md-8">
            {% if title %}
              <h1 class="display-5 pb-2">{{ title }}</h1>
            {% endif %}
            {% if description %}
              <p class="lead fs-4">{{ description }}</p>
            {% endif %}
            <p class="small text-secondary">
              By
              <a href="{{ site['org-url'] }}">{{ site.org }}</a>
              / {% include "date.html" %}
            </p>
          </div>
          <div class="col-12 col-md-2"></div>
        </div>
      </div>
    </div>
  {% else %}
    {% include "jumbotron-default.html" %}
  {% endif %}
</div>
